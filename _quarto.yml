project:
  type: website
  output-dir: _site
  resources:
    - brain-network-background.html
    - data/brain_mesh.json
    - data/tracts_preview.json
    - js/home-visual.js

execute:
  freeze: auto

render:
    - index.qmd
    - setup.qmd
    - agenda/agenda.qmd
    - slides.qmd
    - notebooks/1_introduction.qmd
    - notebooks/1_1_MathematicalFramework/DynamicalSystems.qmd
    - notebooks/2_NetworkAndNoise/NetworkAndNoise.qmd
    - notebooks/3_ParameterExploration/ParameterExploration.qmd
    - notebooks/4_BifurcationAnalysis/BifurcationAnalysis.qmd
    - notebooks/4_optimization.qmd
    - notebooks/04a_alzheimer_usecase.qmd
    - notebooks/04b_parameter_fitting.qmd
    - notebooks/4_inference_demos.qmd
    - notebooks/5_stimulation.qmd
    - notebooks/05_stimulation.qmd

website:
  title: "Brainsimulation Workshop"
  description: "Towards translational and mechanistic whole-brain simulations with The Virtual Brain"
  site-url: "https://virtual-twin.github.io/Brain-Simulation-Workshop"
  repo-url: "https://github.com/virtual-twin/Brain-Simulation-Workshop"
  repo-actions: [edit, issue]
  page-navigation: true
  back-to-top-navigation: true
  navbar:
    logo: img/logo.png
    background: light
    search: true
    left:
      - href: index.qmd
        text: Home
      - href: setup.qmd
        text: Setup
      - href: agenda/agenda.qmd
        text: Agenda
      - href: slides.qmd
        text: Slides
      - text: Notebooks
        menu:
          - href: notebooks/1_introduction.qmd
            text: "0. Introduction to Brain Network Modelling"
          - text: "---"
          - href: notebooks/1_1_MathematicalFramework/DynamicalSystems.qmd
            text: "1. Dynamical Systems"
          - href: notebooks/2_NetworkAndNoise/NetworkAndNoise.qmd
            text: "2. Networks and Noise"
          - href: notebooks/3_ParameterExploration/ParameterExploration.qmd
            text: "3. Parameter Exploration"
          - href: notebooks/4_BifurcationAnalysis/BifurcationAnalysis.qmd
            text: "4. Bifurcation Analysis"
          - text: "---"
          - href: notebooks/4_optimization.qmd
            text: "5. Parameter optimisation"
          - href: notebooks/04a_alzheimer_usecase.qmd
            text: "  5.1 Alzheimer use case"
          - href: notebooks/04b_parameter_fitting.qmd
            text: "  5.2 Parameter fitting"
          - href: notebooks/4_inference_demos.qmd
            text: "  5.3 Inference demos"
          - text: "---"
          - href: notebooks/5_stimulation.qmd
            text: "6. Stimulating the brain"
          - href: notebooks/05_stimulation.qmd
            text: "  6.1 Stimulation"
    right:
      - icon: github
        href: "https://github.com/virtual-twin/Brain-Simulation-Workshop"
        aria-label: GitHub
  sidebar:
    - title: "Notebooks"
      style: docked
      contents:
        - setup.qmd
        - notebooks/1_introduction.qmd
        - section: "1. Dynamical Systems"
          contents:
            - notebooks/1_1_MathematicalFramework/DynamicalSystems.qmd
        - section: "2. Networks and Noise"
          contents:
            - notebooks/2_NetworkAndNoise/NetworkAndNoise.qmd
        - section: "3. Parameter Exploration"
          contents:
            - notebooks/3_ParameterExploration/ParameterExploration.qmd
        - section: "4. Bifurcation Analysis"
          contents:
            - notebooks/4_BifurcationAnalysis/BifurcationAnalysis.qmd
        - section: "5. Parameter optimisation"
          href: notebooks/4_optimization.qmd
          contents:
            - notebooks/04a_alzheimer_usecase.qmd
            - notebooks/04b_parameter_fitting.qmd
            - notebooks/4_inference_demos.qmd
        - section: "6. Stimulating the brain"
          href: notebooks/5_stimulation.qmd
          contents:
            - notebooks/05_stimulation.qmd
  page-footer:
    left: "© 2026 TVB Workshop. Charité University Medicine Berlin and Berlin Institute of Health."
    center: |
      [![Charité](/img/Charite.png){fig-alt="Charité" height="40px"}](https://www.charite.de)
      &nbsp;&nbsp;
      [![BIH](/img/BIH.png){fig-alt="BIH" height="40px"}](https://www.bihealth.org)
      &nbsp;&nbsp;
      [![BSS](/img/BSS.png){fig-alt="BSS" height="40px"}](https://www.berlin-school-of-mind-and-brain.de)
      &nbsp;&nbsp;
      [![EBRAINS](/img/EBRAINS.svg){fig-alt="EBRAINS" height="40px"}](https://ebrains.eu)
    right:
      - icon: github
        href: "https://github.com/virtual-twin/Brain-Simulation-Workshop"

bibliography: bibliography.bib
link-external-newwindow: true

format:
  html:
    theme: cosmo
    css:
      - _brand.css
      - styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    highlight-style: github
  ipynb:
    toc: true
    toc-depth: 3



