      &nbsp;&nbsp;
      [![EBRAINS](/img/EBRAINS.svg){fig-alt="EBRAINS" height="40px"}](https://ebrains.eu)
    right:
      - icon: github
        href: "https://github.com/virtual-twin/tvb-ontology-optim-workshop"

bibliography: bibliography.bib
