<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brain network visualization</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      brain-network-visual,
      brain-network-visual canvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <brain-network-visual
      mesh-src="data/brain_mesh.json"
      tracts-src="data/tracts_preview.json"
      alpha="1"
      mesh-alpha="0.92"
      tract-alpha="0.94"
      node-alpha="0.9"
      pulse-alpha="0.9"
      field-alpha="0.72"
    ></brain-network-visual>
    <script type="module" src="js/home-visual.js"></script>
  </body>
</html>
